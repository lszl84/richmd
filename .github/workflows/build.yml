name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang ninja-build cmake \
            libwxgtk3.2-dev libgtk-3-dev \
            dpkg-dev file

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            build/richmd-*.deb
            build/richmd-*.tar.gz

      - name: Build AppImage
        env:
          # AppImage tools are themselves AppImages; on Ubuntu 24.04 (no
          # libfuse2 by default) the FUSE-mount path fails. extract-and-run
          # mode uses a tmpfs unpack instead.
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          version=$(grep -oP 'project\(richmd VERSION \K[0-9.]+' CMakeLists.txt)
          cmake --install build --prefix AppDir/usr
          curl -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          OUTPUT="richmd-${version}-x86_64.AppImage" \
            ./linuxdeploy-x86_64.AppImage \
              --appdir AppDir \
              --plugin gtk \
              --desktop-file AppDir/usr/share/applications/richmd.desktop \
              --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/richmd.svg \
              --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: richmd-*.AppImage

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        # ninja is preinstalled on macos-14
        run: brew install wxwidgets

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: build/richmd-*.dmg

  windows:
    name: Windows (mingw-clang)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up MSYS2 (CLANG64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-wxwidgets3.2-msw
            mingw-w64-clang-x86_64-nsis

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: build/richmd-*.exe

  flatpak:
    name: Flatpak
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Build bundle
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: richmd.flatpak
          manifest-path: flatpak/com.devmindscape.richmd.yaml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/com.devmindscape.richmd.yaml') }}
          upload-artifact: false

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v7
        with:
          name: linux-flatpak
          path: richmd.flatpak

  release:
    name: Publish GitHub Release
    needs: [linux, macos, windows, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
